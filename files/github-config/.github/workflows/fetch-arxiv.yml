name: Update Daily Embodied arXiv Snapshot

on:
  workflow_dispatch:
    inputs:
      daily_days:
        description: "Lookback days for the daily snapshot"
        required: false
        default: "1"
      daily_max_results:
        description: "Maximum filtered papers for the daily snapshot"
        required: false
        default: "20"
      daily_fetch_size:
        description: "Candidate fetch size from arXiv"
        required: false
        default: "120"
  schedule:
    - cron: "30 1 * * *"

permissions:
  contents: write

jobs:
  fetch-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate daily outputs
        run: |
          python scripts/update_embodied_arxiv_outputs.py \
            --mode daily \
            --daily-days "${{ github.event.inputs.daily_days || '1' }}" \
            --daily-max-results "${{ github.event.inputs.daily_max_results || '20' }}" \
            --daily-fetch-size "${{ github.event.inputs.daily_fetch_size || '120' }}"

      - name: Commit daily snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/arxiv/daily generated/arxiv/README.md scripts/fetch_embodied_arxiv.py scripts/update_embodied_arxiv_outputs.py
          if git diff --cached --quiet; then
            echo "No daily snapshot changes."
          else
            git commit -m "chore: update daily embodied arxiv snapshot"
            git push
          fi
